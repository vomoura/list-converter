<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Lista - Lorcana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            padding: 12px 16px;
            font-size: 1.2rem;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 8px;
            gap: 8px;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel label {
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #a0a0c0;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            width: 100%;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #1a4080;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            resize: none;
            min-height: 0;
        }

        textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }

        textarea::placeholder {
            color: #5a6a8a;
        }

        .btn-row {
            flex-shrink: 0;
            padding: 8px;
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #convertBtn {
            background: #4a90d9;
            color: #fff;
        }

        #convertBtn:hover {
            background: #3a7bc8;
        }

        #convertBtn:disabled {
            background: #3a5070;
            cursor: not-allowed;
        }

        #copyBtn {
            background: #2ecc71;
            color: #fff;
        }

        #copyBtn:hover {
            background: #27ae60;
        }

        #copyBtn:disabled {
            background: #1a7a40;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            font-size: 0.8rem;
            padding: 4px;
            min-height: 24px;
            flex-shrink: 0;
            color: #a0a0c0;
        }

        .status.error {
            color: #e74c3c;
        }

        .status.success {
            color: #2ecc71;
        }

        /* Desktop layout */
        @media (min-width: 768px) {
            .container {
                flex-direction: row;
                padding: 12px;
                gap: 12px;
            }

            h1 {
                font-size: 1.4rem;
                padding: 16px;
            }

            textarea {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <h1>Conversor de Lista</h1>
    <div class="status" id="status"></div>
    <div class="container">
        <div class="panel">
            <label for="input">Lista original:</label>
            <textarea id="input" placeholder="Cole sua lista aqui...&#10;Ex: 4 Elsa - The Fifth Spirit"></textarea>
        </div>
        <div class="panel">
            <label for="output">Lista convertida:</label>
            <textarea id="output" readonly placeholder="A lista convertida aparecerá aqui..."></textarea>
        </div>
    </div>
    <div class="btn-row">
        <button id="convertBtn">Converter</button>
        <button id="copyBtn" disabled>Copiar</button>
    </div>

    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const convertBtn = document.getElementById('convertBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statusEl = document.getElementById('status');

        function setStatus(msg, type = '') {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + type;
        }

        function parseLine(line) {
            line = line.trim();
            if (!line) return null;
            const match = line.match(/^(\d+)\s+(.+)$/);
            if (!match) return null;
            const qty = match[1];
            const fullName = match[2].trim();
            return { qty, fullName };
        }

        async function searchCard(fullName) {
            const query = encodeURIComponent(fullName);
            const url = `https://api.lorcast.com/v0/cards/search?q=${query}`;
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Erro na API para "${fullName}": ${response.status}`);
            }
            const data = await response.json();
            if (!data.results || data.results.length === 0) {
                throw new Error(`Carta não encontrada: "${fullName}"`);
            }

            // Try to find exact match by name + version
            const parts = fullName.split(' - ');
            const cardName = parts[0].trim();
            const cardVersion = parts.length > 1 ? parts[1].trim() : null;

            let card = data.results[0];
            for (const result of data.results) {
                const nameMatch = result.name.toLowerCase() === cardName.toLowerCase();
                const versionMatch = cardVersion
                    ? result.version && result.version.toLowerCase() === cardVersion.toLowerCase()
                    : !result.version;
                if (nameMatch && versionMatch) {
                    card = result;
                    break;
                }
            }

            return card;
        }

        function formatSetCode(code) {
            return `LOR${code}`;
        }

        function formatOutputLine(qty, fullName, collectorNumber, setCode) {
            return `${qty} ${fullName} (${collectorNumber}) [QUALIDADE=NM][EDICAO=${formatSetCode(setCode)}]`;
        }

        convertBtn.addEventListener('click', async () => {
            const inputText = inputEl.value.trim();
            if (!inputText) {
                setStatus('Cole uma lista no campo de entrada.', 'error');
                return;
            }

            const lines = inputText.split('\n').filter(l => l.trim());
            const parsed = lines.map(parseLine).filter(Boolean);

            if (parsed.length === 0) {
                setStatus('Nenhuma linha válida encontrada.', 'error');
                return;
            }

            convertBtn.disabled = true;
            outputEl.value = '';
            copyBtn.disabled = true;
            setStatus(`Convertendo... 0/${parsed.length}`);

            const results = [];
            let errors = [];

            for (let i = 0; i < parsed.length; i++) {
                const { qty, fullName } = parsed[i];
                setStatus(`Convertendo... ${i + 1}/${parsed.length} - ${fullName}`);
                try {
                    const card = await searchCard(fullName);
                    const line = formatOutputLine(qty, fullName, card.collector_number, card.set.code);
                    results.push(line);
                } catch (err) {
                    errors.push(err.message);
                    results.push(`${qty} ${fullName} [ERRO: ${err.message}]`);
                }
            }

            outputEl.value = results.join('\n');
            copyBtn.disabled = false;
            convertBtn.disabled = false;

            if (errors.length > 0) {
                setStatus(`Concluído com ${errors.length} erro(s).`, 'error');
            } else {
                setStatus(`Conversão concluída! ${parsed.length} cartas processadas.`, 'success');
            }
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(outputEl.value);
                setStatus('Copiado para a área de transferência!', 'success');
            } catch (err) {
                outputEl.select();
                document.execCommand('copy');
                setStatus('Copiado!', 'success');
            }
        });
    </script>
</body>
</html>
