<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Lista - Lorcana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Conversor de Lista</h1>
    <div class="status" id="status"></div>
    <div class="container">
        <div class="panel">
            <label for="input">Lista original:</label>
            <textarea id="input" placeholder="4 Elsa - The Fifth Spirit&#10;4 Maximus - Team Champion&#10;3 Negaduck - Public Enemy Number One&#10;4 Mr. Incredible - Super Strong&#10;..."></textarea>
            <button id="convertBtn">Converter</button>
        </div>
        <div class="panel">
            <label for="output">Lista convertida:</label>
            <textarea id="output" readonly placeholder="A lista convertida aparecerá aqui..."></textarea>
            <button id="copyBtn" disabled>Copiar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
